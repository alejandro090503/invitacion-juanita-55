<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta property="og:title" content="Mis Fabulosos 55 — Juanita">
<meta property="og:description" content="¡Te invito a celebrar mis fabulosos 55 años de puro Brillo! 29 de Abril 2026">
<title>Mis Fabulosos 55 — Juanita</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600;1,700&family=Great+Vibes&family=Cinzel:wght@400;600&family=Bodoni+Moda:ital,opsz,wght@1,6..96,700;1,6..96,900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  background: #050300;
  overflow: hidden;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  min-height: 100dvh;
}

/* ─── CONTENEDOR ─── */
.invite {
  width: min(430px, 100vw);
  height: 100dvh;
  max-height: 926px;
  position: relative;
  background: #000;
  overflow: hidden;
}

@media (min-width: 431px) {
  .invite {
    border-radius: 36px;
    height: min(926px, 95dvh);
    box-shadow: 0 0 0 1px #1a1200, 0 32px 90px rgba(0,0,0,0.85);
  }
}

/* ─── CANVAS ─── */
#canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 2;
}

/* ─── FONDO ─── */
.bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 90% 45% at 50% 0%,  rgba(175,125,10,0.20) 0%, transparent 70%),
    radial-gradient(ellipse 60% 35% at 50% 100%, rgba(75,42,0,0.22)   0%, transparent 60%),
    #000;
  z-index: 0;
}

/* ─── CONTENIDO ─── */
.content {
  position: absolute;
  inset: 0;
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: clamp(24px, 6dvh, 52px) clamp(20px, 6vw, 36px) clamp(20px, 5dvh, 40px);
}

/* ── TOP ── */
.top { text-align: center; }

.te-invita {
  font-family: 'Great Vibes', cursive;
  color: #c8803a;
  font-size: clamp(14px, 3.8vw, 20px);
  opacity: 0.9;
  display: block;
  animation: riseIn 1.4s ease both;
}

.mis {
  font-family: 'Great Vibes', cursive;
  color: #c9a35a;
  font-size: clamp(22px, 5.8vw, 30px);
  display: block;
  animation: riseIn 1.4s 0.1s ease both;
}

.numero {
  font-family: 'Bodoni Moda', serif;
  font-size: clamp(96px, 26vw, 136px);
  font-weight: 900;
  font-style: italic;
  line-height: 1;
  display: block;
  padding-bottom: 0.08em;
  background: linear-gradient(165deg,
    #f5ead0 0%,
    #e8c96e 18%,
    #d4af37 38%,
    #b8960c 58%,
    #8b6914 78%,
    #5c440a 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -2px;
  animation: riseIn 1.3s 0.2s ease both, pulseGlow 4s 1.6s ease-in-out infinite;
}

@keyframes pulseGlow {
  0%,100% { filter: drop-shadow(0 0 10px rgba(212,175,55,0.18)); }
  50%      { filter: drop-shadow(0 0 32px rgba(212,175,55,0.45)) drop-shadow(0 0 70px rgba(139,105,20,0.22)); }
}

.anos-text {
  font-family: 'Cinzel', serif;
  color: #a07820;
  font-size: clamp(6px, 1.5vw, 8.5px);
  letter-spacing: clamp(3px, 0.9vw, 6px);
  font-weight: 400;
  display: block;
  white-space: nowrap;
  margin-top: 4px;
  animation: riseIn 1.3s 0.35s ease both;
}

.brillo {
  font-family: 'Great Vibes', cursive;
  color: rgba(201,163,90,0.82);
  font-size: clamp(14px, 3.8vw, 19px);
  display: block;
  margin-top: 6px;
  animation: riseIn 1.3s 0.45s ease both;
}

@keyframes riseIn {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── NOMBRE ── */
.nombre-wrap {
  display: flex;
  align-items: center;
  width: 100%;
  gap: 10px;
  animation: riseIn 1.3s 0.55s ease both;
}
.nombre-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(184,134,11,0.4));
}
.nombre-line.r {
  background: linear-gradient(90deg, rgba(184,134,11,0.4), transparent);
}
.nombre {
  font-family: 'Great Vibes', cursive;
  color: #d4af37;
  font-size: clamp(28px, 8vw, 40px);
  text-shadow: 0 0 22px rgba(212,175,55,0.28);
  white-space: nowrap;
}

/* ── COUNTDOWN ── */
.countdown {
  width: 100%;
  background: rgba(0,0,0,0.48);
  border: 1px solid rgba(180,130,10,0.22);
  border-radius: 14px;
  padding: clamp(8px, 2.2dvh, 14px) clamp(10px, 4vw, 22px);
  text-align: center;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  animation: riseIn 1.3s 0.65s ease both;
}
.cd-label {
  font-family: 'Cinzel', serif;
  color: #957220;
  font-size: clamp(5px, 1.3vw, 7px);
  letter-spacing: 3px;
  margin-bottom: 8px;
  display: block;
}
.cd-units {
  display: flex;
  justify-content: center;
  gap: clamp(4px, 1.5vw, 14px);
  align-items: flex-end;
}
.cd-unit { text-align: center; min-width: 34px; }
.cd-num {
  font-family: 'Cinzel', serif;
  color: #d4af37;
  font-size: clamp(19px, 5.5vw, 27px);
  font-weight: 600;
  line-height: 1;
  text-shadow: 0 0 14px rgba(212,175,55,0.35);
  display: block;
}
.cd-sep {
  color: rgba(160,120,32,0.5);
  font-size: 16px;
  padding-bottom: 3px;
}
.cd-lbl {
  font-family: 'Cinzel', serif;
  color: rgba(100,75,10,0.75);
  font-size: clamp(4.5px, 1.1vw, 6px);
  letter-spacing: 1px;
  margin-top: 3px;
  display: block;
}

/* ── BOTTOM ── */
.bottom {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(7px, 1.8dvh, 13px);
  animation: riseIn 1.3s 0.75s ease both;
}

.fecha {
  font-family: 'Cinzel', serif;
  color: #a07820;
  font-size: clamp(7px, 1.8vw, 9.5px);
  letter-spacing: clamp(2px, 0.7vw, 3.5px);
  text-align: center;
}

.lugar {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: rgba(160,118,30,0.52);
  font-size: clamp(11px, 2.8vw, 14px);
  text-align: center;
}

/* Mapa integrado */
.map-link {
  display: block;
  width: 100%;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid rgba(212,175,55,0.18);
  text-decoration: none;
  transition: opacity 0.3s;
  flex-shrink: 0;
}
.map-link:hover { opacity: 0.85; }
.map-link iframe {
  width: 100%;
  height: clamp(80px, 14dvh, 130px);
  border: none;
  display: block;
  filter: grayscale(1) invert(1) sepia(0.3) saturate(0.6) hue-rotate(5deg) brightness(0.7);
}

/* Botón RSVP */
.rsvp-btn {
  width: 85%;
  border: 1px solid rgba(212,175,55,0.5);
  border-radius: 40px;
  padding: clamp(8px, 2dvh, 11px) 0;
  text-align: center;
  background: rgba(212,175,55,0.06);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  text-decoration: none;
  display: block;
  transition: border-color 0.3s, background 0.3s, transform 0.18s;
}
.rsvp-btn:hover  { border-color: rgba(212,175,55,0.9); background: rgba(212,175,55,0.11); }
.rsvp-btn:active { transform: scale(0.97); }
.rsvp-btn span {
  font-family: 'Cinzel', serif;
  color: #c9a84c;
  font-size: clamp(6px, 1.5vw, 8px);
  font-weight: 600;
  letter-spacing: 1.5px;
  white-space: nowrap;
}

.ornament {
  font-family: 'Cormorant Garamond', serif;
  color: rgba(160,118,30,0.28);
  font-size: 10px;
  letter-spacing: 10px;
}
</style>
</head>
<body>
<div class="invite">
  <div class="bg"></div>
  <canvas id="canvas"></canvas>

  <div class="content">

    <!-- TOP -->
    <div class="top">
      <span class="te-invita">te invita a celebrar</span>
      <span class="mis">Mis</span>
      <span class="numero">55</span>
      <span class="anos-text">F A B U L O S O S &nbsp; A Ñ O S</span>
      <span class="brillo">✦ de puro Brillo ✦</span>
    </div>

    <!-- NOMBRE -->
    <div class="nombre-wrap">
      <div class="nombre-line"></div>
      <span class="nombre">Juanita</span>
      <div class="nombre-line r"></div>
    </div>

    <!-- COUNTDOWN -->
    <div class="countdown">
      <span class="cd-label">C U E N T A &nbsp; R E G R E S I V A</span>
      <div class="cd-units">
        <div class="cd-unit">
          <span class="cd-num" id="cd-d">--</span>
          <span class="cd-lbl">DÍAS</span>
        </div>
        <span class="cd-sep">·</span>
        <div class="cd-unit">
          <span class="cd-num" id="cd-h">--</span>
          <span class="cd-lbl">HORAS</span>
        </div>
        <span class="cd-sep">·</span>
        <div class="cd-unit">
          <span class="cd-num" id="cd-m">--</span>
          <span class="cd-lbl">MIN</span>
        </div>
        <span class="cd-sep">·</span>
        <div class="cd-unit">
          <span class="cd-num" id="cd-s">--</span>
          <span class="cd-lbl">SEG</span>
        </div>
      </div>
    </div>

    <!-- BOTTOM -->
    <div class="bottom">
      <div class="fecha">29 · A B R I L · 2026 &nbsp;|&nbsp; 4:00 PM</div>

      <a class="map-link"
         href="https://maps.google.com/?q=Bellini+206+Campestre+Italiana+Querétaro"
         target="_blank"
         rel="noopener">
        <iframe
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3724.2!2d-100.4060!3d20.6296!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjDCsDM3JzQ2LjYiTiAxMDDCsDI0JzIxLjYiVw!5e0!3m2!1ses!2smx!4v1681000000000!5m2!1ses!2smx&q=Bellini+206,+Campestre+Italiana,+Querétaro"
          allowfullscreen>
        </iframe>
      </a>

      <div class="lugar">📍 Bellini 206, Campestre Italiana, Qro.</div>

      <a class="rsvp-btn"
         href="https://wa.me/524426808623?text=¡Hola!%20Confirmo%20mi%20asistencia%20a%20los%20fabulosos%2055%20de%20Juanita%20🎉"
         target="_blank"
         rel="noopener">
        <span>✦ &nbsp; C O N F I R M A R &nbsp; A S I S T E N C I A &nbsp; ✦</span>
      </a>

      <div class="ornament">~ ◆ ~</div>
    </div>

  </div>
</div>

<script>
/* ═══════════════ COUNTDOWN ═══════════════ */
const TARGET = new Date('2026-04-29T16:00:00');
function tick() {
  const diff = TARGET - Date.now();
  const pad  = n => String(Math.max(0, Math.floor(n))).padStart(2, '0');
  if (diff <= 0) {
    ['cd-d','cd-h','cd-m','cd-s'].forEach(id => document.getElementById(id).textContent = '00');
    return;
  }
  document.getElementById('cd-d').textContent = pad(diff / 86400000);
  document.getElementById('cd-h').textContent = pad((diff % 86400000) / 3600000);
  document.getElementById('cd-m').textContent = pad((diff % 3600000)  / 60000);
  document.getElementById('cd-s').textContent = pad((diff % 60000)    / 1000);
}
tick();
setInterval(tick, 1000);

/* ═══════════════ CANVAS ═══════════════ */
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}
resize();
window.addEventListener('resize', resize);

/* ── RAYO DE LUZ DIFUMINADO ── */
let beamT = 0;
function drawBeam() {
  const W = canvas.width, H = canvas.height, cx = W / 2;
  beamT += 0.005;
  const pulse = 0.82 + 0.18 * Math.sin(beamT);

  // Atmósfera amplia
  const atm = ctx.createRadialGradient(cx, -H * 0.08, 0, cx, -H * 0.08, H);
  atm.addColorStop(0,    `rgba(255,220,80,${0.11 * pulse})`);
  atm.addColorStop(0.18, `rgba(255,200,60,${0.07 * pulse})`);
  atm.addColorStop(0.42, `rgba(200,150,20,${0.03 * pulse})`);
  atm.addColorStop(1,    'rgba(150,100,0,0)');
  ctx.fillStyle = atm;
  ctx.fillRect(0, 0, W, H);

  // Columna central escalonada
  for (let i = 0; i < 10; i++) {
    const t     = i / 10;
    const y     = H * t * 0.72;
    const halfW = W * (0.28 + t * 0.32);
    const alpha = (1 - t) * 0.055 * pulse;
    const rg = ctx.createRadialGradient(cx, y, 0, cx, y, halfW);
    rg.addColorStop(0,   `rgba(255,230,100,${alpha})`);
    rg.addColorStop(0.4, `rgba(255,210,60,${alpha * 0.5})`);
    rg.addColorStop(1,   'rgba(255,190,20,0)');
    ctx.fillStyle = rg;
    ctx.fillRect(0, 0, W, H);
  }

  // Núcleo brillante
  for (let i = 0; i < 8; i++) {
    const t     = i / 8;
    const y     = H * t * 0.5;
    const halfW = W * (0.06 + t * 0.10);
    const alpha = (1 - t) * 0.09 * pulse;
    const rg = ctx.createRadialGradient(cx, y, 0, cx, y, halfW);
    rg.addColorStop(0,   `rgba(255,255,200,${alpha})`);
    rg.addColorStop(0.5, `rgba(255,230,100,${alpha * 0.4})`);
    rg.addColorStop(1,   'rgba(255,220,80,0)');
    ctx.fillStyle = rg;
    ctx.fillRect(0, 0, W, H);
  }

  // Corona en la cima
  const crownR = 55 + 12 * Math.sin(beamT * 1.8);
  const crown  = ctx.createRadialGradient(cx, 0, 0, cx, 0, crownR);
  crown.addColorStop(0,    `rgba(255,255,230,${0.55 * pulse})`);
  crown.addColorStop(0.3,  `rgba(255,230,120,${0.28 * pulse})`);
  crown.addColorStop(0.65, `rgba(255,210,60,${0.10 * pulse})`);
  crown.addColorStop(1,    'rgba(255,200,0,0)');
  ctx.fillStyle = crown;
  ctx.fillRect(0, 0, W, H);
}

/* ── PARTÍCULAS DORADAS ── */
const PALETTE = [
  [255,215,0],[218,165,32],[255,248,180],[200,150,12],[255,235,120]
];

class Particle {
  constructor(initial) { this.init(initial); }
  init(initial = false) {
    const W = canvas.width, H = canvas.height;
    this.x        = Math.random() * W;
    this.y        = Math.random() * H;
    this.r        = Math.random() * 1.3 + 0.3;
    this.vy       = -(Math.random() * 0.14 + 0.03);
    this.vx       = (Math.random() - 0.5) * 0.10;
    this.alpha    = initial ? Math.random() * 0.18 : 0;
    this.maxAlpha = Math.random() * 0.25 + 0.07;
    this.life     = initial ? Math.floor(Math.random() * 400) : 0;
    this.maxLife  = Math.random() * 600 + 400;
    this.color    = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    this.phi      = Math.random() * Math.PI * 2;
    this.phiSpeed = Math.random() * 0.015 + 0.004;
  }
  update() {
    this.x   += this.vx;
    this.y   += this.vy;
    this.life++;
    this.phi += this.phiSpeed;
    const p    = this.life / this.maxLife;
    const base = p < 0.1 ? p / 0.1 : p > 0.8 ? (1 - p) / 0.2 : 1;
    this.alpha = base * this.maxAlpha * (0.85 + 0.15 * Math.sin(this.phi));
    return this.life < this.maxLife;
  }
  draw() {
    const [r,g,b] = this.color;
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, this.alpha));
    ctx.translate(this.x, this.y);
    ctx.beginPath();
    ctx.arc(0, 0, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fill();
    const gr = ctx.createRadialGradient(0,0,0, 0,0, this.r * 5);
    gr.addColorStop(0, `rgba(${r},${g},${b},0.25)`);
    gr.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(0, 0, this.r * 5, 0, Math.PI * 2);
    ctx.fillStyle = gr;
    ctx.fill();
    ctx.restore();
  }
}

const particles = Array.from({ length: 80 }, () => new Particle(true));

(function frame() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBeam();
  particles.forEach(p => { if (!p.update()) p.init(false); p.draw(); });
  requestAnimationFrame(frame);
})();
</script>
</body>
